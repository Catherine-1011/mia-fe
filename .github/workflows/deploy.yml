name: Deploy to DigitalOcean Droplet

on:
  push:
    branches:
      - main   # Change this if your production branch has a different name

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: 22
          script: |
            set -e

            # --- Go to the project directory on the droplet ---
            cd /root/mia-fe

            # --- Pull latest code ---
            git pull origin main

            # --- Install dependencies (skip dev deps in production) ---
            npm ci --omit=dev

            # --- Build Next.js ---
            npm run build

            # --- Restart PM2 process ---
            # If the process doesn't exist yet, 'start' it; otherwise 'reload' for zero-downtime
            pm2 reload mia-fe --update-env || pm2 start npm --name "mia-fe" -- start

            # --- Save PM2 process list so it survives reboots ---
            pm2 save
